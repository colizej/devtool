<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — SEO Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  {% load static %}
  <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🔍</div>
      <h1 class="text-2xl font-bold text-gray-900">SEO Dashboard</h1>
      <p class="text-gray-400 text-sm mt-1">Локальный центр управления</p>
    </div>

    {% if form.errors %}
    <div class="mb-4 px-4 py-3 rounded-md bg-red-50 text-red-700 text-sm border border-red-200">
      Неверный логин или пароль.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="id_username">Логин</label>
        <input type="text" name="username" id="id_username" autofocus required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="id_password">Пароль</label>
        <input type="password" name="password" id="id_password" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
        Войти
      </button>
    </form>
  </div>
</body>
</html>
